<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boblocky</title>

  <style>
    * {
      user-select: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #202020;
      font-family: sans-serif;
    }

    /* Sidebar */
    #sidebar {
      position: absolute;
      top: 0;
      left: 0;
      width: 260px;
      height: 100vh;
      background: #1a1a1a;
      color: white;
      padding: 15px;
      box-sizing: border-box;
      border-right: 2px solid #333;
      overflow-y: auto;
      z-index: 20;
    }

    .sprite-item {
      background: #2a2a2a;
      padding: 8px;
      margin-bottom: 6px;
      border-radius: 4px;
      cursor: pointer;
    }
    .sprite-item.selected { background: #3a3a3a; }

    #categories {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .category-tab {
      padding: 8px 12px;
      background: #2a2a2a;
      border-radius: 4px;
      cursor: pointer;
    }
    .category-tab.selected { background: #3a3a3a; }

    .block {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #2a2a2a;
      padding: 10px;
      margin-bottom: 6px;
      border-radius: 4px;
      cursor: grab;
    }
    .block-input {
      width: 50px;
      background: #444;
      border: none;
      color: white;
      padding: 4px;
      border-radius: 4px;
    }

    /* Explorer */
    #explorer {
      position: absolute;
      top: 0;
      right: 0;
      width: 260px;
      height: 100vh;
      background: #1a1a1a;
      color: white;
      padding: 15px;
      border-left: 2px solid #333;
      box-sizing: border-box;
      overflow-y: auto;
      z-index: 20;
    }

    .script-item {
      background: #222;
      padding: 6px 8px;
      margin-bottom: 4px;
      border-radius: 4px;
      cursor: pointer;
    }
    .script-item.selected { background: #3a3a3a; }

    /* Tabs */
    #top-tabs {
      position: absolute;
      top: 0;
      left: 260px;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      z-index: 30;
    }
    .top-tab {
      padding: 6px 12px;
      background: #2a2a2a;
      color: #eee;
      border-radius: 4px;
      cursor: pointer;
    }
    .top-tab.selected { background: #3a3a3a; }

    /* Canvas */
    #scene {
      position: absolute;
      top: 40px;
      left: 260px;
      width: calc(100vw - 520px);
      height: calc(100vh - 40px);
      display: block;
      z-index: 1;
    }

    /* Script Workspace */
    #script-workspace {
      position: absolute;
      top: 40px;
      left: 260px;
      width: calc(100vw - 520px);
      height: calc(100vh - 40px);
      background: #181818;
      overflow: visible;
      padding: 10px;
      box-sizing: border-box;
      display: none;
      z-index: 10;
    }

    .script-container {
      border: 1px dashed #444;
      border-radius: 4px;
      padding: 10px;
      min-height: 200px;
      margin-bottom: 20px;
    }

    .script-block {
      background: #2a2a2a;
      padding: 8px;
      border-radius: 4px;
      margin: 4px 0;
      display: flex;
      gap: 6px;
      cursor: grab;
      position: relative;
    }
  </style>
</head>

<body>

  <!-- LEFT SIDEBAR -->
  <div id="sidebar">
    <div id="sprite-selector">
      <div class="sprite-item selected" data-sprite="cube1">Cube 1</div>
    </div>

    <div id="categories">
      <div class="category-tab selected" data-category="view">View</div>
      <div class="category-tab" data-category="motion">Motion</div>
    </div>

    <div id="blocks-container"></div>
  </div>

  <!-- RIGHT EXPLORER -->
  <div id="explorer">
    <div id="explorer-header">
      <span>Scripts</span>
      <button id="add-script">+</button>
    </div>
    <div id="script-list">
      <div class="script-item selected" data-script-id="script1">Script 1</div>
    </div>
  </div>

  <!-- TOP TABS -->
  <div id="top-tabs">
    <div class="top-tab selected" data-view="preview">Preview</div>
    <div class="top-tab" data-view="scripts">Scripts</div>
  </div>

  <!-- CANVAS -->
  <canvas id="scene"></canvas>

  <!-- SCRIPT WORKSPACE -->
  <div id="script-workspace">
    <div class="script-container" data-script-id="script1"></div>
  </div>

  <script src="js/three.min.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
