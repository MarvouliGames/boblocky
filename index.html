<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boblocky</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #202020;
      font-family: sans-serif;
    }

    /* Sidebar */
    #sidebar {
      position: absolute;
      top: 0;
      left: 0;
      width: 260px;
      height: 100vh;
      background: #1a1a1a;
      color: white;
      padding: 15px;
      box-sizing: border-box;
      border-right: 2px solid #333;
      overflow-y: auto;
      z-index: 10;
    }

    /* Sprite selector */
    #sprite-selector {
      margin-bottom: 10px;
    }

    .sprite-item {
      background: #2a2a2a;
      padding: 8px;
      margin-bottom: 6px;
      border-radius: 4px;
      cursor: pointer;
    }

    .sprite-item.selected {
      background: #3a3a3a;
    }

    /* Explorer (now on the right side) */
    #explorer {
      position: absolute;
      top: 0;
      right: 0;
      width: 260px;
      height: 100vh;
      background: #1a1a1a;
      color: white;
      padding: 15px;
      border-left: 2px solid #333;
      box-sizing: border-box;
      overflow-y: auto;
      z-index: 10;
    }

    #explorer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 14px;
    }

    #explorer-header button {
      background: #2a2a2a;
      border: none;
      color: #eee;
      border-radius: 4px;
      cursor: pointer;
      width: 22px;
      height: 22px;
      padding: 0;
    }

    .script-item {
      background: #222;
      padding: 6px 8px;
      margin-bottom: 4px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .script-item.selected {
      background: #3a3a3a;
    }

    /* Top tabs */
    #top-tabs {
      position: absolute;
      top: 0;
      left: 260px;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      z-index: 20;
    }

    .top-tab {
      padding: 6px 12px;
      background: #2a2a2a;
      color: #eee;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .top-tab.selected {
      background: #3a3a3a;
    }

    /* Canvas (Preview mode) */
    #scene {
      position: absolute;
      top: 40px;
      left: 260px;
      width: calc(100vw - 520px);
      height: calc(100vh - 40px);
      display: block;
    }

    #scene.fullscreen {
      width: calc(100vw - 260px);
    }

    /* Script Workspace (Scripts tab) */
    #script-workspace {
      position: absolute;
      top: 40px;
      left: 260px;
      width: calc(100vw - 520px);
      height: calc(100vh - 40px);
      background: #181818;
      overflow-y: auto;
      padding: 10px;
      display: none;
    }

    .script-container {
      position: relative;
      min-height: 200px;
      margin-bottom: 20px;
      border: 1px dashed #444;
      border-radius: 4px;
      padding: 10px;
    }

    .script-block {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #2a2a2a;
    padding: 8px;
    border-radius: 4px;
    cursor: grab;
    position: relative; /* not absolute by default */
    margin: 4px 0;
  }


    .script-block:active {
      cursor: grabbing;
    }

    /* Blocks in sidebar */
    #blocks-container {
      margin-top: 10px;
    }

    .block {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #2a2a2a;
      padding: 10px;
      margin-bottom: 6px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 13px;
    }

    .block:hover {
      background: #3a3a3a;
    }

    .block-input {
      width: 50px;
      background: #444;
      border: none;
      color: white;
      padding: 4px;
      border-radius: 4px;
      font-size: 12px;
    }

    .block-input[type="color"] {
      width: 40px;
      height: 22px;
      padding: 0;
    }
  </style>
</head>

<body>

  <!-- LEFT SIDEBAR -->
  <div id="sidebar">

    <div id="sprite-selector">
      <div class="sprite-item selected" data-sprite="cube1">Cube 1</div>
    </div>

    <div id="categories">
      <div class="category-tab selected" data-category="view">View</div>
      <div class="category-tab" data-category="motion">Motion</div>
    </div>

    <div id="blocks-container"></div>

  </div>

  <!-- RIGHT EXPLORER -->
  <div id="explorer">
    <div id="explorer-header">
      <span>Scripts</span>
      <button id="add-script">+</button>
    </div>
    <div id="script-list">
      <div class="script-item selected" data-script-id="script1">Script 1</div>
    </div>
  </div>

  <!-- TOP TABS -->
  <div id="top-tabs">
    <div class="top-tab selected" data-view="preview">Preview</div>
    <div class="top-tab" data-view="scripts">Scripts</div>
  </div>

  <!-- CANVAS (Preview mode) -->
  <canvas id="scene"></canvas>

  <!-- SCRIPT WORKSPACE (Scripts tab) -->
  <div id="script-workspace">
    <div class="script-container" data-script-id="script1"></div>
  </div>

  <script src="js/three.min.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
