<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boblocky</title>
  <style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

    canvas {
    position: absolute;
    top: 0;
    left: 220px; /* sidebar width */
    width: calc(100vw - 220px);
    height: 100vh;
    display: block;
}

#sidebar {
  position: absolute;
  top: 0;
  left: 0;
  width: 260px;
  height: 100vh;
  background: #1a1a1a;
  color: white;
  padding: 15px;
  box-sizing: border-box;
  border-right: 2px solid #333;
  overflow-y: auto;
  z-index: 10;
}

#sidebar h2 {
  margin-top: 0;
  font-size: 22px;
  margin-bottom: 15px;
}

.category {
  margin-bottom: 20px;
}

.category-title {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 8px;
  color: #ccc;
}

.block {
  background: #2a2a2a;
  padding: 10px;
  margin-bottom: 6px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s;
}

.block:hover {
  background: #3a3a3a;
}
#sprite-selector {
  margin-bottom: 20px;
}

.sprite-item {
  background: #2a2a2a;
  padding: 8px;
  margin-bottom: 6px;
  border-radius: 4px;
  cursor: pointer;
}

.sprite-item.selected {
  background: #3a3a3a;
}

#categories {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.category-tab {
  padding: 8px 12px;
  background: #2a2a2a;
  border-radius: 4px;
  cursor: pointer;
}

.category-tab.selected {
  background: #3a3a3a;
}

#blocks-container .block {
  background: #2a2a2a;
  padding: 10px;
  margin-bottom: 6px;
  border-radius: 4px;
  cursor: pointer;
}
.script-block {
  background: #2a2a2a;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 4px;
  cursor: grab;
  position: relative;
}

.script-block:active {
  cursor: grabbing;
}
#script-scroll {
  position: relative;
}

</style>

</head>
<body>

<div id="sidebar">

  <div id="sprite-selector">
    <div class="sprite-item selected" data-sprite="cube1">Cube 1</div>
  </div>

  <div id="categories">
    <div class="category-tab selected" data-category="view">View</div>
    <div class="category-tab" data-category="motion">Motion</div>
  </div>

  <div id="blocks-container">
    <!-- Blocks appear here dynamically -->
  </div>

</div>

<canvas id="scene"></canvas>

<script src="js/three.min.js"></script>
<script src="js/app.js"></script>

</body>

</html>
