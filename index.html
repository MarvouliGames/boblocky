<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boblocky</title>
  <style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

    canvas {
    position: absolute;
    top: 0;
    left: 220px; /* sidebar width */
    width: calc(100vw - 220px);
    height: 100vh;
    display: block;
}

#sidebar {
  position: absolute;
  top: 0;
  left: 0;
  width: 260px;
  height: 100vh;
  background: #1a1a1a;
  color: white;
  padding: 15px;
  box-sizing: border-box;
  border-right: 2px solid #333;
  overflow-y: auto;
  z-index: 10;
}

#sidebar h2 {
  margin-top: 0;
  font-size: 22px;
  margin-bottom: 15px;
}

.category {
  margin-bottom: 20px;
}

.category-title {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 8px;
  color: #ccc;
}

.block {
  background: #2a2a2a;
  padding: 10px;
  margin-bottom: 6px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s;
}

.block:hover {
  background: #3a3a3a;
}


</style>

</head>
<body>

<div id="sidebar">
  <h2>Blocks</h2>

  <div class="category">
    <div class="category-title">Shapes</div>
    <div class="block" data-action="addCube">Add Cube</div>
    <div class="block" data-action="addSphere">Add Sphere</div>
  </div>

  <div class="category">
    <div class="category-title">Lights</div>
    <div class="block" data-action="addDirectionalLight">Directional Light</div>
    <div class="block" data-action="addPointLight">Point Light</div>
  </div>

  <div class="category">
    <div class="category-title">Camera</div>
    <div class="block" data-action="resetCamera">Reset Camera</div>
  </div>
</div>


  <canvas id="scene"></canvas>
  
  <script src="js/three.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
