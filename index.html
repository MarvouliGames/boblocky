<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boblocky</title>
  <style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

    canvas {
    position: absolute;
    top: 0;
    left: 220px; /* sidebar width */
    width: calc(100vw - 220px);
    height: 100vh;
    display: block;
}

    #sidebar {
    position: absolute;
    top: 0;
    left: 0;
    width: 220px;
    height: 100vh;
    background: #1a1a1a;
    color: white;
    padding: 15px;
    box-sizing: border-box;
    border-right: 2px solid #333;
    z-index: 10;
}

    #sidebar h2 {
    margin-top: 0;
    font-size: 20px;
}

    #sidebar button {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    background: #333;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 4px;
}

    #sidebar button:hover {
    background: #444;
}

</style>

</head>
<body>

<div id="sidebar">
  <h2>Editor</h2>
  <button>Add Cube</button>
  <button>Add Light</button>
  <button>Settings</button>
</div>

  <canvas id="scene"></canvas>
  
  <script src="js/three.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
